set -g default-shell /bin/zsh
# Use tmux's modern terminfo entry instead of screen-256color.
# This improves terminal capability handling for apps running inside tmux.
set-option -g default-terminal "tmux-256color"

# Tell tmux the outer terminal (Alacritty reports xterm-256color here)
# supports truecolor / RGB colors and extended keys.
set-option -ga terminal-features ",xterm-256color:RGB,extkeys"

# Enable CSI-u extended key reporting so modified keys like Ctrl+1/2/3 can
# survive the terminal -> tmux -> app path.
set -g extended-keys-format csi-u
set -g extended-keys on
set -g focus-events on

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -sg escape-time 1
set -g base-index 1
setw -g pane-base-index 1

#Mouse works as expected
set -g mouse on

setw -g monitor-activity on
set -g visual-activity on

set -g mode-keys vi
set -g history-limit 10000

# y and p as in vim
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
bind-key -T copy-mode-vi 'Space' send -X halfpage-down
bind-key -T copy-mode-vi 'Bspace' send -X halfpage-up

# extra commands for interacting with the ICCCM clipboard
bind C-c run "tmux save-buffer - | xclip -i -sel clipboard"
bind C-v run "tmux set-buffer \"$(xclip -o -sel clipboard)\"; tmux paste-buffer"

# easy-to-remember split pane commands
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# always open new tmux windows on ~
bind c new-window -c ~

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# don't rename windows automatically
set-option -g allow-rename off

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g status-right 'Continuum status: #{continuum_status}'

# pressing ctrl a twice alternate panes without having to zoom out
bind -r a select-pane -l \;  resize-pane -Z

set -gq allow-passthrough on

set -g @plugin 'TanglingTreats/tmux-everforest' # Adds to the list of plugins
set -g @tmux-everforest 'dark-medium' # Sets the option to select the theme. Also the default.

run -b '~/.tmux/plugins/tpm/tpm'

# Mark any tmux window as dirty in the status line until you visit it.
#
# Important: if an app is running in some background tmux pane/window, plain:
#   tmux set-option -w @dirty 1
# targets the ACTIVE window of the client that runs the command, which may be
# the wrong one.
#
# So an app running inside tmux should target ITS OWN pane via $TMUX_PANE:
#   tmux set-option -w -t "$TMUX_PANE" @dirty 1
#
# Optional manual clear for the app's own window:
#   tmux set-option -w -t "$TMUX_PANE" @dirty 0
#
# You can also target another window explicitly with -t session:window or
# -t :window:
#   tmux set-option -w -t :2 @dirty 1
#   tmux set-option -w -t work:2 @dirty 1
#
# Note: the Everforest theme plugin rewrites window-status-format during TPM
# startup, so we keep the desired format in a user option and re-apply it on
# attach and after a config reload.
set -g @window_status_normal '#[fg=#{@everforest_grey0},bg=#{@everforest_bg0}] #I  #[fg=#{@everforest_grey0},bg=#{@everforest_bg0}]#W '
set -g @window_status_dirty '#[fg=#{@everforest_bg0},bg=colour3,bold] #I #[fg=colour3,bg=#{@everforest_bg0},nobold]#[fg=colour3,bg=#{@everforest_bg0},bold] #W ! '
set -g @window_status_format_dirty '#{?#{==:#{@dirty},1},#{E:@window_status_dirty},#{E:@window_status_normal}}'
set -g window-status-format '#{?#{==:#{@dirty},1},#{E:@window_status_dirty},#{E:@window_status_normal}}'
set-hook -g client-attached 'run-shell -b ~/.tmux/reapply-dirty-window-format.sh'
run-shell -b 'sleep 3; ~/.tmux/reapply-dirty-window-format.sh'

# tmux has no built-in user-option-changed hook. after-set-option is the
# closest native hook and lets us redraw the status line immediately.
set-hook -g after-set-option 'refresh-client -S'

# Visiting a dirty window acknowledges the change and restores the normal/current
# theme style for that window.
set-hook -g after-select-window 'if -F "#{==:#{@dirty},1}" "set -w @dirty 0; refresh-client -S" ""'
